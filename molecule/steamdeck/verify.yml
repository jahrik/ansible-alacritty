---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Stat ~/.local/bin/alacritty
      ansible.builtin.stat:
        path: ~/.local/bin/alacritty
      register: alacritty_bin

    - name: Assert alacritty binary exists
      ansible.builtin.assert:
        that: alacritty_bin.stat.exists
        fail_msg: "~/.local/bin/alacritty not found"

    - name: Stat ~/.local/share/applications/Alacritty.desktop
      ansible.builtin.stat:
        path: ~/.local/share/applications/Alacritty.desktop
      register: alacritty_desktop

    - name: Assert desktop entry exists
      ansible.builtin.assert:
        that: alacritty_desktop.stat.exists
        fail_msg: "~/.local/share/applications/Alacritty.desktop not found"

    - name: Stat ~/.local/share/icons/Alacritty.svg
      ansible.builtin.stat:
        path: ~/.local/share/icons/Alacritty.svg
      register: alacritty_icon

    - name: Assert icon exists
      ansible.builtin.assert:
        that: alacritty_icon.stat.exists
        fail_msg: "~/.local/share/icons/Alacritty.svg not found"

    - name: Stat ~/.config/alacritty/alacritty.toml
      ansible.builtin.stat:
        path: ~/.config/alacritty/alacritty.toml
      register: alacritty_cfg

    - name: Assert config exists
      ansible.builtin.assert:
        that: alacritty_cfg.stat.exists
        fail_msg: "~/.config/alacritty/alacritty.toml not found"
