---
- name: Prepare
  hosts: all
  tasks:
    - name: Simulate SteamOS /etc/os-release
      become: true
      ansible.builtin.copy:
        content: |
          ID=steamos
          ID_LIKE=arch
          NAME="SteamOS"
          PRETTY_NAME="SteamOS"
          VERSION_ID="3.6"
        dest: /etc/os-release
        mode: "0644"
