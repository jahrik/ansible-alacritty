---
- name: Check for SteamOS
  ansible.builtin.stat:
    path: /etc/steamos-release
  register: steamos_release

- name: Include steamos
  ansible.builtin.include_tasks: steamos.yml
  when: steamos_release.stat.exists

- name: Include debian
  ansible.builtin.include_tasks: debian.yml
  when: ansible_os_family == 'Debian'

- name: Include archlinux
  ansible.builtin.include_tasks: archlinux.yml
  when: ansible_os_family == 'Archlinux' and not steamos_release.stat.exists

- name: Install alacritty
  become: true
  ansible.builtin.package:
    name:
      - alacritty
    state: present
  when: ansible_os_family != 'Archlinux'

- name: Create ~/.config/alacritty directory
  become: false
  ansible.builtin.file:
    path: ~/.config/alacritty
    state: directory
    mode: '0755'

- name: Generate alacritty config files
  become: false
  ansible.builtin.template:
    src: alacritty.toml.j2
    dest: ~/.config/alacritty/alacritty.toml
    mode: '0644'
