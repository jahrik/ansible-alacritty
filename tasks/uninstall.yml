---
- name: Remove alacritty binary, desktop entry, and icon (SteamOS)
  become: false
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - ~/.local/bin/alacritty
    - ~/.local/share/applications/Alacritty.desktop
    - ~/.local/share/icons/Alacritty.svg
  when: ansible_facts['distribution_release'] == 'holo'

- name: Uninstall alacritty (macOS)
  become: false
  community.general.homebrew_cask:
    name: alacritty
    state: absent
  when: ansible_facts['os_family'] == 'Darwin'

- name: Uninstall alacritty
  become: true
  ansible.builtin.package:
    name:
      - alacritty
    state: absent
  when: ansible_facts['os_family'] not in ['Darwin'] and ansible_facts['distribution_release'] != 'holo'

- name: Destroy ~/.config/alacritty directory
  become: false
  ansible.builtin.file:
    path: ~/.config/alacritty
    state: absent
